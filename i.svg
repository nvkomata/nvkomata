<svg fill="none" viewBox="0 0 800 200" width="800" height="200" xmlns="http://www.w3.org/2000/svg">
	<foreignObject width="100%" height="100%">
		<div xmlns="http://www.w3.org/1999/xhtml">
			<style>
                .marquee {
                    height: 400px;
                    width: 100%;

                    overflow: hidden;
                    position: relative;

                    color: white;
                }

				.container {
					display: block;
                    width: 200%;
                    height: 400px;

                    position: absolute;
                    overflow: hidden;

                    animation: marquee 5s linear infinite;

                    font-family: monospace;
				}

                .marquee span {
                    float: left;
                    width: 25%;
                    font-size: 40px;
					line-height: 1.3;
					letter-spacing: 5px;
					text-shadow:
						0 1px 0 2px #efefef,
						0 2px 0 2px #efefef,
						0 3px 0 2px #efefef,
						0 4px 0 2px #efefef,
						0 3px 5px 2px rgba(0, 0, 0, 0.85);
                }

                @keyframes marquee {
                    0% { left: 0; }
                    100% { left: -100%; }
                }
			</style>
			<div class="marquee">
                <div class="container">
                    <span>NVKOMATA</span>
                    <span>WELCOME...</span>
                    <span>NVKOMATA</span>
                    <span>WELCOME...</span>
			    </div>
			</div>
		</div>
	</foreignObject>
</svg>